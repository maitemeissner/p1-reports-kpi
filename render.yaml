services:
  - type: web
    name: reports-kpi
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run streamlit_app.py --server.port $PORT --server.address 0.0.0.0
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DATA_PATH
        value: /data
    disk:
      name: data
      mountPath: /data
      sizeGB: 1

  - type: web
    name: mcp-reports
    runtime: node
    buildCommand: cd mcp-server && npm install && npm run build
    startCommand: cd mcp-server && node dist/index.js
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: DATA_PATH
        value: /data
    disk:
      name: data
      mountPath: /data
      sizeGB: 1

  - type: cron
    name: etl-cron
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python etl.py
    schedule: "0 */6 * * *"
    envVars:
      - key: DATA_PATH
        value: /data
    disk:
      name: data
      mountPath: /data
      sizeGB: 1
